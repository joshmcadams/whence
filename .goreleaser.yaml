# GoReleaser configuration. Validate with: goreleaser check
#
# NOTE: update `jmcadams` below (module path + repo owners) to your real GitHub
# username before tagging a release.
version: 2

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: ports
    main: ./cmd/ports
    binary: ports
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/jmcadams/ports/internal/cli.version={{ .Version }}

archives:
  - id: ports
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# Homebrew cask — requires a tap repo (github.com/jmcadams/homebrew-tap) and a
# HOMEBREW_TAP_GITHUB_TOKEN secret with write access to it.
homebrew_casks:
  - name: ports
    repository:
      owner: jmcadams
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/jmcadams/ports"
    description: "Track and manage the dev servers and databases you have running on local ports"
    # Remove the macOS quarantine attribute so the binary runs without a Gatekeeper prompt.
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/ports"]
          end

# Scoop manifest — requires a bucket repo (github.com/jmcadams/scoop-bucket) and
# a SCOOP_BUCKET_GITHUB_TOKEN secret.
scoops:
  - repository:
      owner: jmcadams
      name: scoop-bucket
      token: "{{ .Env.SCOOP_BUCKET_GITHUB_TOKEN }}"
    homepage: "https://github.com/jmcadams/ports"
    description: "Track and manage the dev servers and databases you have running on local ports"
    license: "MIT"
